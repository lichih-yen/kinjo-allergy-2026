let currentFilter = "";
function getTagClass(word) {
  const w = String(word).toLowerCase();
  if (w.includes("wheat") || w.includes("gluten")) return "tag-wheat";
  if (w.includes("egg")) return "tag-egg";
  if (w.includes("dairy") || w.includes("milk") || w.includes("cream")) return "tag-dairy";
  if (w.includes("soy")) return "tag-soy";
  if (w.includes("shellfish")) return "tag-shellfish";
  if (w.includes("seafood")) return "tag-seafood";
  if (w.includes("fish") || w.includes("tuna") || w.includes("salmon") || w.includes("cod") || w.includes("saba") || w.includes("hamachi") || w.includes("snapper")) return "tag-fish";
  if (w.includes("sesame")) return "tag-sesame";
  if (w.includes("peanut")) return "tag-peanut";
  if (w.includes("tree nut") || w.includes("tree nuts") || w.includes("almond") || w.includes("nuts")) return "tag-tree-nut";
  if (w.includes("alcohol") || w.includes("mirin")) return "tag-alcohol";
  if (w.includes("lemon")) return "tag-lemon";
  if (w.includes("fruit") || w.includes("apple") || w.includes("orange") || w.includes("mango") || w.includes("yuzu") || w.includes("peach") || w.includes("grapefruit") || w.includes("watermelon") || w.includes("raspberry")) return "tag-fruit";
  if (w.includes("mustard")) return "tag-mustard";
  if (w.includes("sulphite") || w.includes("sulfite")) return "tag-sulphite";
  return "tag-default";
}
function splitItems(text) {
  if (!text) return [];
  return String(text).split(/,|;/).map(x => cleanTagText(x)).filter(Boolean);
}
function cleanTagText(text) {
  return String(text || "")
    .trim()
    // When text like "Seafood(Shellfish, Fish)" is split by comma, it can create "Fish)".
    // This removes only unmatched closing brackets while keeping normal text like "Seafood(Fish)".
    .replace(/^[)]*/, "")
    .replace(/\)+$/g, function(match, offset, fullText) {
      return fullText.includes("(") ? match : "";
    })
    .trim();
}
function makeTags(text, type = "normal") {
  const items = splitItems(text);
  if (!items.length) return "N/A";
  const extraClass = type === "sauceAllergy" ? " sauce-tag" : "";
  return items.map(item => `<span class="allergy-tag${extraClass} ${getTagClass(item)}">${escapeHtml(item)}</span>`).join("");
}
function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
function normalizeText(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, " ")
    .trim();
}
function itemText(item) {
  return [item.menu,item.allergy,item.sauce,item.sauceAllergy,item.mayContain].join(' ').toLowerCase();
}
function getSearchScore(item, searchText, searchWords) {
  if (!searchText) return 0;

  const query = normalizeText(searchText);
  const menu = normalizeText(item.menu);
  const sauce = normalizeText(item.sauce);
  const allergy = normalizeText(item.allergy);
  const sauceAllergy = normalizeText(item.sauceAllergy);
  const mayContain = normalizeText(item.mayContain);

  if (menu === query) return 1000;              // exact full menu name, e.g. Ikura Sushi
  if (menu.startsWith(query)) return 800;       // menu starts with query
  if (menu.includes(query)) return 650;         // query appears inside menu name
  if (sauce.includes(query)) return 450;
  if (allergy.includes(query)) return 300;
  if (sauceAllergy.includes(query)) return 250;
  if (mayContain.includes(query)) return 200;

  return searchWords.length ? 100 : 0;
}
function renderResults() {
  const rawSearchText = document.getElementById("searchInput").value.trim();
  const searchText = rawSearchText.toLowerCase();
  const searchWords = searchText.split(/\s+/).filter(Boolean);
  const filtered = allergyData
    .filter(item => {
      const keywords = itemText(item);
      const matchesSearch = searchWords.every(word => keywords.includes(word));
      const matchesFilter = currentFilter === "" || keywords.includes(currentFilter.toLowerCase());
      return matchesSearch && matchesFilter;
    })
    .map((item, index) => ({ item, index, score: getSearchScore(item, rawSearchText, searchWords) }))
    .sort((a, b) => b.score - a.score || a.index - b.index)
    .map(result => result.item);

  document.getElementById("resultCount").textContent = `Results: ${filtered.length} / ${allergyData.length}`;
  const resultsDiv = document.getElementById("results");
  if (!filtered.length) { resultsDiv.innerHTML = `<div class="no-result">No result found.</div>`; return; }
  resultsDiv.innerHTML = filtered.map(item => {
    const isExactMenuMatch = rawSearchText && normalizeText(item.menu) === normalizeText(rawSearchText);
    return `
    <div class="card">
      <div class="menu-name">${escapeHtml(item.menu)}${isExactMenuMatch ? `<span class="exact-match-badge">Exact Menu Match</span>` : ""}</div>
      <div class="row"><span class="label">Menu Allergy:</span>${makeTags(item.allergy)}</div>
      <div class="row"><span class="label">Sauce / Topping:</span>${makeTags(item.sauce)}</div>
      <div class="row sauce-allergy-row"><span class="label">Sauce Allergy:</span>${makeTags(item.sauceAllergy, "sauceAllergy")}</div>
      ${item.mayContain ? `<div class="warning"><span class="label">May Contain:</span>${makeTags(item.mayContain)}</div>` : ""}
      <div class="source-page">PDF page: ${item.page || "N/A"}</div>
    </div>`;
  }).join("");
}
function filterByAllergy(allergy) {
  currentFilter = allergy;

  document.getElementById("searchInput").value = "";

    btn.classList.remove("active");
    if (btn.textContent.toLowerCase().includes(allergy.toLowerCase()) || (allergy==='Wheat' && btn.textContent.toLowerCase().includes('gluten'))) btn.classList.add("active");
  });
  renderResults();
}
function clearFilters() {
  currentFilter = "";
  document.getElementById("searchInput").value = "";
  document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));

}
